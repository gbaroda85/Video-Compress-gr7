    <title>VidFlow | Professional Video Tools in Your Browser</title>
    <script>
      // Workaround for formdata-polyfill trying to set window.fetch
      try {
        let originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: function() { return originalFetch; },
          set: function(val) { originalFetch = val; }
        });
      } catch (e) {
        console.error('Failed to patch window.fetch', e);
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
